# Snippet for nginx when the site root is the Laravel project folder (not /public).
# Adjust paths and include inside your server { } block for yesorno.plateos.site.

root /home/yesorno/domains/yesorno.plateos.site/public_html;
index index.php;

location ~ /\.(?!well-known) {
    deny all;
}

location ~ ^/(app|bootstrap|config|database|resources|routes|storage|tests|vendor)(/|$) {
    deny all;
}

location ~ ^/(\.env|composer\.(json|lock)|artisan|phpunit\.xml)$ {
    deny all;
}

location / {
    try_files $uri $uri/ /public/index.php?$query_string;
}

location ~ ^/public/index\.php$ {
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    include fastcgi_params;
    fastcgi_hide_header X-Powered-By;
}

location ~ \.php$ {
    return 404;
}
